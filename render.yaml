services:
  - type: web
    name: fake-news-detector-backend
    env: python
    buildCommand: pip install -r requirements.txt && python backend/src/pre_download.py
    startCommand: python -m uvicorn backend.src.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MODEL_DOWNLOAD_URL
        value: "https://drive.usercontent.com/download?id=1Fb_nBpNYwZw9nXQ7PYlXkRAeRa4o0uAb&export=download&confirm=t"
